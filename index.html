<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Booking iOS Style</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/michelegera/sf-pro-web-font@master/stylesheet.css">
    <style>
        /* Переменные для точных цветов iOS (темная тема) */
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --hint-color: #8e8e93;
            --red-color: #ff3b30;
            --selected-bg: #bf5af2;
            --input-bg: #1c1c1e;
            --border-color: #2c2c2e;
            --today-bg: #ff3b30;
        }

        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            padding-bottom: 80px; /* Место для кнопки внизу */
        }

        .app-container {
            width: 100%;
            padding: 10px 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 1. Блок навигации (как в iOS) */
        .ios-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 44px;
            padding: 0 5px;
        }

        .back-year {
            color: var(--red-color);
            font-size: 17px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .ios-icon-group {
            display: flex;
            gap: 15px;
            color: var(--red-color);
            font-size: 20px;
        }

        /* 2. НАШ КАЛЕНДАРЬ В СТИЛЕ IOS (Бесконечная прокрутка) */
        .calendar-section {
            display: flex;
            flex-direction: column;
        }

        /* Дни недели Пн-Вс */
        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            color: var(--hint-color);
            font-size: 12px;
            font-weight: 500;
            text-transform: lowercase;
            padding-bottom: 10px;
            position: sticky; /* Прилипает к верху при прокрутке */
            top: 0;
            background-color: var(--bg-color);
            z-index: 10;
        }

        /* Контейнер для месяцев */
        .months-scroll {
            display: flex;
            flex-direction: column;
        }

        /* Блок одного месяца */
        .month-block {
            padding-bottom: 30px;
        }

        /* Заголовок Месяца («Март», «Апрель») */
        .month-header {
            font-size: 34px;
            font-weight: bold;
            color: var(--text-color);
            margin: 15px 0 20px 0;
        }
